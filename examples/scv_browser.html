<!DOCTYPE html>

    <style>
      html, body {
        box-sizing: border-box;
        display: flow-root;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      .bk-tooltip.patch-hover-tooltip {
        box-sizing: border-box;
        max-width: calc(100vw - 48px) !important;
        max-height: calc(100vh - 48px) !important;
        overflow: auto !important;
        padding: 8px !important;
      }

      .patch-hover-grid {
        display: grid !important;
        gap: 8px !important;
        align-items: start !important;
      }

      .patch-hover-grid > * {
        margin: 0 !important;
      }

      .patch-hover-card {
        box-sizing: border-box;
        width: 108px;
        padding: 5px;
        border: 1px solid #444;
        background: #fff;
        color: #222;
        font: 12px/1.25 system-ui, sans-serif;
      }

      .patch-hover-id,
      .patch-hover-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .patch-hover-thumb {
        overflow: hidden;
        width: 96px;
        height: 96px;
        margin: 4px 0;
        border: 1px solid #444;
        background: #f7f7f7;
      }

      .data-source-controls {
        box-sizing: border-box;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        padding: 8px 12px;
        border-bottom: 1px solid #ddd;
        background: #fff;
        color: #222;
        font: 13px/1.4 system-ui, sans-serif;
      }

      .data-source-controls label {
        font-weight: 600;
      }

      .data-source-controls select {
        max-width: min(420px, 100%);
        padding: 4px 28px 4px 8px;
        font: inherit;
      }

      .data-source-share {
        color: #666;
        overflow-wrap: anywhere;
      }

      .data-source-share:hover {
        text-decoration: underline;
      }

      .cluster-hover-card {
        box-sizing: border-box;
        max-width: 280px;
        padding: 8px 10px;
        border: 1px solid #777;
        border-radius: 4px;
        background: #fff;
        color: #222;
        font: 13px/1.35 system-ui, sans-serif;
      }

      .cluster-hover-title {
        margin-bottom: 4px;
        font-weight: 700;
      }

      .cluster-hover-description {
        color: #444;
        overflow-wrap: anywhere;
      }
    </style>

        function visit(value, fn) {
          if (Array.isArray(value)) {
            for (const item of value) visit(item, fn);
            return;
          }
          if (value && typeof value === "object") {
            fn(value);
            for (const child of Object.values(value)) visit(child, fn);
          }
        }

        function findModels(root, modelName) {
          const matches = [];
          visit(root, function(node) {
            if (node && node.type === "object" && node.name === modelName) matches.push(node);
          });
          return matches;
        }

        function findDataOption(id) {
          return DATA_OPTIONS.find(function(option) {
            return option.id === id;
          });
        }

        function getFallbackDataUrl() {
          const target = document.getElementById(CONTAINER_ID);
          return (target && target.dataset.source) || DEFAULT_DATA_URL;
        }

        function getDataSource() {
          const params = new URLSearchParams(window.location.search);
          const optionId = params.get(DATA_OPTION_PARAM);
          const option = findDataOption(optionId);

          if (option) return Object.assign({predefined: true}, option);
          if (optionId) console.warn("Unknown data option:", optionId);

          const customUrl = params.get(DATA_URL_PARAM);
          if (customUrl) {
            return {id: "__custom__", label: "Custom data URL", url: customUrl, predefined: false};
          }

          const fallbackUrl = getFallbackDataUrl();
          const fallbackOption = DATA_OPTIONS.find(function(item) {
            return item.url === fallbackUrl;
          });
          if (fallbackOption) return Object.assign({predefined: true}, fallbackOption);
          return {id: "__default__", label: "Default data", url: fallbackUrl, predefined: false};
        }

        function optionShareQuery(option) {
          return "?" + DATA_OPTION_PARAM + "=" + encodeURIComponent(option.id);
        }

        function optionShareUrl(option) {
          const url = new URL(window.location.href);
          url.searchParams.set(DATA_OPTION_PARAM, option.id);
          url.searchParams.delete(DATA_URL_PARAM);
          return url;
        }

        function installDataSourceSelector(dataSource) {
          const select = document.getElementById("data-source-select");
          const share = document.getElementById("data-source-share");
          if (!select) return;

          select.textContent = "";
          for (const option of DATA_OPTIONS) {
            const item = document.createElement("option");
            item.value = option.id;
            item.textContent = option.label;
            select.appendChild(item);
          }

          if (dataSource.predefined) {
            select.value = dataSource.id;
          } else {
            const customOption = document.createElement("option");
            customOption.value = dataSource.id;
            customOption.textContent = dataSource.label + " (" + dataSource.url + ")";
            select.appendChild(customOption);
            select.value = dataSource.id;
          }

          if (share) {
            if (dataSource.predefined) {
              const shareUrl = optionShareUrl(dataSource);
              share.href = shareUrl.toString();
              share.textContent = "Share link: " + optionShareQuery(dataSource);
            } else {
              share.removeAttribute("href");
              share.textContent = "Loaded from ?data=" + dataSource.url;
            }
          }

          select.onchange = function() {
            const option = findDataOption(select.value);
            if (!option) return;

            window.location.assign(optionShareUrl(option).toString());
          };
        }

        function buildRenderItems(docs) {
          const docid = Object.keys(docs)[0];
          const root = docid && docs[docid].roots && docs[docid].roots[0];
          if (!docid || !root || !root.id) throw new Error("Template is missing a Bokeh root model.");
          return [{docid: docid, roots: {[root.id]: CONTAINER_ID}, root_ids: [root.id]}];
        }

        function normalizeColumns(columns) {
          if (!columns || typeof columns !== "object" || Array.isArray(columns)) {
            throw new Error("Data JSON must be an object of array columns.");
          }
          if (!Array.isArray(columns.x) || !Array.isArray(columns.y)) {
            throw new Error("Data JSON must include x and y columns.");
          }

          const entries = Object.entries(columns).filter(function(entry) { return Array.isArray(entry[1]); });
          const lengths = entries.map(function(entry) { return entry[1].length; });
          const minLength = Math.min.apply(null, lengths);
          const maxLength = Math.max.apply(null, lengths);
          const normalized = {};

          for (const entry of entries) normalized[entry[0]] = entry[1];

          if (minLength !== maxLength) {
            console.warn("Data columns have different lengths; truncating to", minLength);
            for (const entry of entries) normalized[entry[0]] = entry[1].slice(0, minLength);
          }
          if (Array.isArray(normalized.label)) {
            normalized.label = normalized.label.map(function(value) { return String(value); });
          }
          return normalized;
        }

        function toBokehMap(columns) {
          return {type: "map", entries: Object.entries(columns)};
        }

        function normalizeAnnotations(value) {
          if (!value || typeof value !== "object" || Array.isArray(value)) return {clusters: []};
          const clusters = Array.isArray(value.clusters) ? value.clusters : [];
          return {
            clusters: clusters.map(normalizeClusterAnnotation).filter(Boolean)
          };
        }

        function normalizeClusterAnnotation(cluster, index) {
          if (!cluster || typeof cluster !== "object") return null;
          const polygon = cluster.polygon && typeof cluster.polygon === "object" ? cluster.polygon : cluster;
          if (!Array.isArray(polygon.xs) || !Array.isArray(polygon.ys)) return null;

          const length = Math.min(polygon.xs.length, polygon.ys.length);
          if (length === 0) return null;

          const xs = polygon.xs.slice(0, length).map(Number);
          const ys = polygon.ys.slice(0, length).map(Number);
          if (!xs.every(Number.isFinite) || !ys.every(Number.isFinite)) return null;

          const id = cluster.id != null ? String(cluster.id) : "cluster_" + (index + 1);
          const polygonPadding = Number.isFinite(Number(cluster.polygon_padding)) ? Number(cluster.polygon_padding) : defaultPolygonPadding(xs, ys);
          const padded = paddedPolygon(xs, ys, polygonPadding);
          const rounded = roundedPolygon(padded.xs, padded.ys, cluster.polygon_corner_radius);
          const labelPosition = cluster.label_position && typeof cluster.label_position === "object" ? cluster.label_position : null;
          const labelSide = normalizeLabelSide(cluster.label_side || (labelPosition && labelPosition.side) || (typeof cluster.label_position === "string" ? cluster.label_position : null));
          const labelSettings = labelPositionForSide(rounded.xs, rounded.ys, labelSide, cluster.label_gap);
          const autoLabelPosition = {x: labelSettings.x, y: labelSettings.y};
          const labelX = labelPosition && Number.isFinite(Number(labelPosition.x)) ? Number(labelPosition.x) : autoLabelPosition.x;
          const labelY = labelPosition && Number.isFinite(Number(labelPosition.y)) ? Number(labelPosition.y) : autoLabelPosition.y;
          const anchor = nearestPolygonPoint(rounded.xs, rounded.ys, labelX, labelY);

          return {
            id: id,
            label: cluster.label != null ? String(cluster.label) : id,
            description: cluster.description != null ? String(cluster.description) : "",
            xs: xs,
            ys: ys,
            display_xs: rounded.xs,
            display_ys: rounded.ys,
            anchor_x: anchor.x,
            anchor_y: anchor.y,
            label_x: labelX,
            label_y: labelY,
            label_align: labelSettings.align,
            label_x_offset: labelSettings.x_offset,
            fill_color: cluster.fill_color || "#d62728",
            fill_alpha: Number.isFinite(Number(cluster.fill_alpha)) ? Number(cluster.fill_alpha) : 0,
            line_color: cluster.line_color || cluster.fill_color || "#d62728",
            line_alpha: Number.isFinite(Number(cluster.line_alpha)) ? Number(cluster.line_alpha) : 0.4,
            leader_line_alpha: Number.isFinite(Number(cluster.leader_line_alpha)) ? Number(cluster.leader_line_alpha) : 0.3,
            line_width: Number.isFinite(Number(cluster.line_width)) ? Number(cluster.line_width) : 3,
            label_text_color: cluster.label_text_color || cluster.line_color || cluster.fill_color || "#d62728"
          };
        }

        function defaultPolygonPadding(xs, ys) {
          const bounds = clusterBounds(xs, ys);
          const width = Math.max(bounds.x1 - bounds.x0, 0.01);
          const height = Math.max(bounds.y1 - bounds.y0, 0.01);
          return Math.max(Math.min(width, height) * 0.18, 0.08);
        }

        function paddedPolygon(xs, ys, padding) {
          const centroid = xs.reduce(function(total, x) { return total + x; }, 0) / xs.length;
          const middle = ys.reduce(function(total, y) { return total + y; }, 0) / ys.length;
          const displayXs = [];
          const displayYs = [];

          for (let i = 0; i < xs.length; i++) {
            const dx = xs[i] - centroid;
            const dy = ys[i] - middle;
            const distance = Math.max(Math.hypot(dx, dy), 1e-6);
            displayXs.push(xs[i] + dx / distance * padding);
            displayYs.push(ys[i] + dy / distance * padding);
          }

          return {xs: displayXs, ys: displayYs};
        }

        function roundedPolygon(xs, ys, configuredRadius) {
          const radius = Number.isFinite(Number(configuredRadius)) ? Number(configuredRadius) : defaultPolygonCornerRadius(xs, ys);
          if (xs.length < 3 || radius <= 0) return {xs: xs.slice(), ys: ys.slice()};

          const roundedXs = [];
          const roundedYs = [];
          const steps = 6;

          for (let i = 0; i < xs.length; i++) {
            const previous = (i - 1 + xs.length) % xs.length;
            const next = (i + 1) % xs.length;
            const x = xs[i];
            const y = ys[i];
            const prevDx = xs[previous] - x;
            const prevDy = ys[previous] - y;
            const nextDx = xs[next] - x;
            const nextDy = ys[next] - y;
            const prevLength = Math.max(Math.hypot(prevDx, prevDy), 1e-6);
            const nextLength = Math.max(Math.hypot(nextDx, nextDy), 1e-6);
            const cut = Math.min(radius, prevLength * 0.45, nextLength * 0.45);
            const startX = x + prevDx / prevLength * cut;
            const startY = y + prevDy / prevLength * cut;
            const endX = x + nextDx / nextLength * cut;
            const endY = y + nextDy / nextLength * cut;

            for (let step = 0; step <= steps; step++) {
              const t = step / steps;
              const inverse = 1 - t;
              roundedXs.push(inverse * inverse * startX + 2 * inverse * t * x + t * t * endX);
              roundedYs.push(inverse * inverse * startY + 2 * inverse * t * y + t * t * endY);
            }
          }

          return {xs: roundedXs, ys: roundedYs};
        }

        function defaultPolygonCornerRadius(xs, ys) {
          let minEdge = Infinity;
          for (let i = 0; i < xs.length; i++) {
            const next = (i + 1) % xs.length;
            minEdge = Math.min(minEdge, Math.hypot(xs[next] - xs[i], ys[next] - ys[i]));
          }
          const bounds = clusterBounds(xs, ys);
          const minDimension = Math.max(Math.min(bounds.x1 - bounds.x0, bounds.y1 - bounds.y0), 0.01);
          return Math.min(minEdge * 0.35, minDimension * 0.2);
        }

        function normalizeLabelSide(value) {
          const side = String(value || "top_right").toLowerCase().replace(/[\s-]+/g, "_");
          return ["top_left", "top_right", "bottom_left", "bottom_right"].includes(side) ? side : "top_right";
        }

        function clusterBounds(xs, ys) {
          return {
            x0: Math.min.apply(null, xs),
            y0: Math.min.apply(null, ys),
            x1: Math.max.apply(null, xs),
            y1: Math.max.apply(null, ys)
          };
        }

        function labelPositionForSide(xs, ys, side, configuredGap) {
          const bounds = clusterBounds(xs, ys);
          const width = Math.max(bounds.x1 - bounds.x0, 0.01);
          const height = Math.max(bounds.y1 - bounds.y0, 0.01);
          const gap = Number.isFinite(Number(configuredGap)) ? Number(configuredGap) : Math.max(Math.min(width, height) * 0.35, 0.18);
          const left = side.endsWith("_left");
          const top = side.startsWith("top_");

          return {
            x: left ? bounds.x0 - gap : bounds.x1 + gap,
            y: top ? bounds.y1 + gap : bounds.y0 - gap,
            align: left ? "right" : "left",
            x_offset: left ? -6 : 6
          };
        }

        function nearestPolygonPoint(xs, ys, x, y) {
          let best = {x: xs[0], y: ys[0], distance: Infinity};
          for (let i = 0; i < xs.length; i++) {
            const dx = xs[i] - x;
            const dy = ys[i] - y;
            const distance = dx * dx + dy * dy;
            if (distance < best.distance) best = {x: xs[i], y: ys[i], distance: distance};
          }
          return best;
        }

        function escapeHtml(value) {
          return String(value ?? "").replace(/[&<>"']/g, function(ch) {
            return {"&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"}[ch];
          });

        function installSelectionPreview() {
          const rootView = Object.values(Bokeh.index)[0];
          const doc = rootView && rootView.model && rootView.model.document;
          const source = doc && doc.get_model_by_id("p1001");
          const info = doc && doc.get_model_by_id("p1042");
          if (!source || !info) return;

          let lastSelection = null;
          let activeIndex = null;

          function value(column, i, fallback) {
            const values = source.data[column];
            return values && values[i] != null ? values[i] : fallback;
          }

          function num(column, i, fallback) {
            const n = Number(value(column, i, fallback));
            return Number.isFinite(n) ? n : fallback;
          }

          function roundCoord(value) {
            return Number(Number(value).toFixed(6));
          }

          function selectedPoint(i) {
            return {
              index: Number(i),
              id: value("idx", i, i),
              x: num("x", i, NaN),
              y: num("y", i, NaN),
              label: value("label", i, "")
            };
          }

          function finiteSelectedPoints(indices) {
            return indices.map(selectedPoint).filter(function(point) {
              return Number.isFinite(point.x) && Number.isFinite(point.y);
            });
          }

          function cross(origin, a, b) {
            return (a.x - origin.x) * (b.y - origin.y) - (a.y - origin.y) * (b.x - origin.x);
          }

          function convexHull(points) {
            const unique = [];
            const seen = new Set();

            for (const point of points) {
              const key = roundCoord(point.x) + "," + roundCoord(point.y);
              if (seen.has(key)) continue;
              seen.add(key);
              unique.push({x: point.x, y: point.y});
            }

            unique.sort(function(a, b) {
              return a.x === b.x ? a.y - b.y : a.x - b.x;
            });

            if (unique.length <= 2) return unique;

            const lower = [];
            for (const point of unique) {
              while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], point) <= 0) lower.pop();
              lower.push(point);
            }

            const upper = [];
            for (let i = unique.length - 1; i >= 0; i--) {
              const point = unique[i];
              while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], point) <= 0) upper.pop();
              upper.push(point);
            }

            lower.pop();
            upper.pop();
            return lower.concat(upper);
          }

          function clusterDraft(indices) {
            const points = finiteSelectedPoints(indices);
            const hull = convexHull(points);
            const selectedIds = points.map(function(point) { return point.id; });
            const firstId = selectedIds.length > 0 ? String(selectedIds[0]).replace(/[^A-Za-z0-9_-]+/g, "_") : "selection";

            return {
              id: "cluster_" + firstId,
              label: "New cluster",
              description: "",
              label_side: "top_right",
              polygon_padding: 0.3,
              polygon_corner_radius: 0.12,
              polygon: {
                xs: hull.map(function(point) { return roundCoord(point.x); }),
                ys: hull.map(function(point) { return roundCoord(point.y); })
              }
            };
          }

          function previewThumb(i, active) {

            const origW = Math.max(num("orig_w", i, cell), 1);

            const label = escapeHtml(value("label", i, ""));
            const border = i === active ? "2px solid #1f77b4" : "1px solid #555";

              <button type="button" data-patch-index="${i}" title="Point ${escapeHtml(idx)}" style="width:68px; min-width:68px; padding:0; border:0; background:transparent; text-align:left; cursor:pointer; font:11px/1.2 system-ui, sans-serif; color:#222;">

                  <img src="${url}" style="position:relative; left:calc(-${cx}px * 64 / ${cell}); top:calc(-${cy}px * 64 / ${cell}); width:calc(${origW}px * 64 / ${cell}); height:calc(${origH}px * 64 / ${cell});" />
                </div>
                <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">#${escapeHtml(idx)}</div>
                <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#555;">${label}</div>

          }

          function previewGrid(indices, active) {
            const shown = indices.slice(0, 80);

            return `
              <div style="margin-top:10px;">

                ${more ? `<div style="margin-top:6px; color:#666; font:12px/1.3 system-ui, sans-serif;">Showing first ${shown.length}; ${more} more selected.</div>` : ""}
              </div>`;
          }

          function overview(i) {
            const idx = value("idx", i, i);
            const url = escapeHtml(value("img_url", i, ""));
            const row = num("row", i, 0);
            const col = num("col", i, 0);

                <img src="${url}" style="width:100%; height:100%; object-fit:cover; display:block;" />
                <div style="position:absolute; inset:0; background-image:linear-gradient(to right, rgba(255,255,255,0.6) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.6) 1px, transparent 1px); background-size:calc(100%/7) calc(100%/7); pointer-events:none;"></div>
                <div style="position:absolute; top:calc(${row} * 100% / 7); left:calc(${col} * 100% / 7); width:calc(100% / 7); height:calc(100% / 7); box-sizing:border-box; border:2px solid yellow; pointer-events:none;"></div>
              </div>`;
          }

          function details(i) {
            const url = escapeHtml(value("img_url", i, ""));
            const row = num("row", i, 0);
            const col = num("col", i, 0);
            const label = escapeHtml(value("label", i, ""));
            return `
              <div style="font:13px/1.4 system-ui, sans-serif; overflow-wrap:anywhere; margin-top:10px;">

                <div><b>Patch coords:</b> row=${row}, col=${col}</div>
                <div><b>Image URL:</b> ${url}</div>
              </div>`;
          }

          function clusterCoordinates(indices) {
            const draft = clusterDraft(indices);
            const json = JSON.stringify({annotations: {clusters: [draft]}}, null, 2);
            const polygonNote = draft.polygon.xs.length >= 3
              ? "Paste this top-level annotations field into the data JSON."
              : "Select at least 3 non-collinear points for a polygon hull.";

            return `
              <div style="margin-top:12px; font:13px/1.4 system-ui, sans-serif;">
                <div style="display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px;">
                  <div>
                    <div style="font-weight:600;">Cluster coordinates</div>
                    <div style="color:#666;">${polygonNote}</div>
                  </div>
                  <button type="button" data-copy-cluster-json="true" style="padding:4px 8px; border:1px solid #999; background:#fff; cursor:pointer; font:12px/1.2 system-ui, sans-serif;">Copy JSON</button>
                </div>
                <textarea data-cluster-json="true" readonly style="box-sizing:border-box; width:100%; min-height:180px; resize:vertical; padding:8px; border:1px solid #bbb; background:#fafafa; color:#222; font:11px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;">${escapeHtml(json)}</textarea>
              </div>`;
          }

          function restoreScrollState(state) {
            if (!state) return;

            function restore() {
              for (const item of state.ancestors) {
                item.element.scrollTop = item.top;
                item.element.scrollLeft = item.left;
              }

              const root = state.listRoot && state.listRoot.querySelector ? state.listRoot : document;
              const list = root.querySelector("[data-selected-preview-list]");
              if (list) {
                list.scrollTop = state.listTop;
                list.scrollLeft = state.listLeft;
              }
            }

            requestAnimationFrame(function() {
              restore();
              requestAnimationFrame(restore);
            });
            setTimeout(restore, 0);
          }

          function captureScrollState(button) {
            const list = button.closest("[data-selected-preview-list]");
            const ancestors = [];

            function nextAncestor(element) {
              if (element.parentElement) return element.parentElement;
              const root = element.getRootNode && element.getRootNode();
              return root && root.host ? root.host : null;
            }

            let node = nextAncestor(button);

            while (node) {
              if (node.scrollHeight > node.clientHeight || node.scrollWidth > node.clientWidth) {
                ancestors.push({
                  element: node,
                  top: node.scrollTop,
                  left: node.scrollLeft
                });
              }
              node = nextAncestor(node);
            }

            return {
              listRoot: list ? list.getRootNode() : null,
              listTop: list ? list.scrollTop : 0,
              listLeft: list ? list.scrollLeft : 0,
              ancestors: ancestors
            };
          }

          function renderSelection(selected, scrollState) {
            if (selected.length === 0) {
              activeIndex = null;
              info.text = EMPTY_SELECTION_TEXT;
              return;
            }
            if (!selected.some(function(i) { return Number(i) === Number(activeIndex); })) activeIndex = Number(selected[0]);
            info.text = overview(activeIndex) + details(activeIndex) + previewGrid(selected, activeIndex) + clusterCoordinates(selected);
            restoreScrollState(scrollState);
          }

          function updateIfChanged() {
            const selected = Array.from(source.selected.indices || []);
            const current = selected.join(",");
            if (current === lastSelection) return;
            lastSelection = current;
            renderSelection(selected);
          }

          function patchButtonFromEvent(event) {
            const path = typeof event.composedPath === "function" ? event.composedPath() : [];
            for (const item of path) {
              if (item instanceof Element && item.dataset.patchIndex != null) return item;
            }
            const target = event.target instanceof Element ? event.target : event.target.parentElement;
            return target && target.closest("[data-patch-index]");
          }

          function copyButtonFromEvent(event) {
            const path = typeof event.composedPath === "function" ? event.composedPath() : [];
            for (const item of path) {
              if (item instanceof Element && item.dataset.copyClusterJson != null) return item;
            }
            const target = event.target instanceof Element ? event.target : event.target.parentElement;
            return target && target.closest("[data-copy-cluster-json]");
          }

          function textareaNearButton(button) {
            const root = button.getRootNode && button.getRootNode();
            const container = button.closest("div");
            return (container && container.parentElement && container.parentElement.querySelector("[data-cluster-json]"))
              || (root && root.querySelector && root.querySelector("[data-cluster-json]"))
              || document.querySelector("[data-cluster-json]");
          }

          function copyTextArea(textarea, button) {
            const text = textarea.value;

            function markCopied() {
              const original = button.textContent;
              button.textContent = "Copied";
              setTimeout(function() { button.textContent = original; }, 1000);
            }

            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(text).then(markCopied).catch(function() {
                textarea.select();
                document.execCommand("copy");
                markCopied();
              });
              return;
            }

            textarea.select();
            document.execCommand("copy");
            markCopied();
          }

          document.addEventListener("click", function(event) {
            const copyButton = copyButtonFromEvent(event);
            if (copyButton) {
              const textarea = textareaNearButton(copyButton);
              if (!textarea) return;
              event.preventDefault();
              event.stopPropagation();
              copyTextArea(textarea, copyButton);
              return;
            }

            const button = patchButtonFromEvent(event);
            if (!button) return;
            event.preventDefault();
            event.stopPropagation();
            const selected = Array.from(source.selected.indices || []);
            const nextIndex = Number(button.dataset.patchIndex);
            if (!Number.isInteger(nextIndex)) return;
            const scrollState = captureScrollState(button);
            activeIndex = nextIndex;
            renderSelection(selected, scrollState);
          }, true);

          updateIfChanged();
          setInterval(updateIfChanged, 150);
        }

        function installHoverTooltipLayout() {
          let scheduled = false;

          function collect(root, selector, matches) {
            if (!root || !root.querySelectorAll) return matches;
            matches.push.apply(matches, Array.from(root.querySelectorAll(selector)));
            if (root instanceof Element && root.shadowRoot) collect(root.shadowRoot, selector, matches);
            for (const element of root.querySelectorAll("*")) {
              if (element.shadowRoot) collect(element.shadowRoot, selector, matches);
            }
            return matches;
          }

          function isTooltipElement(element) {
            return element instanceof Element && Array.from(element.classList).some(function(className) {
              return className.toLowerCase().includes("tooltip");
            });
          }

          function closestTooltip(element) {
            let node = element;
            while (node) {
              if (isTooltipElement(node)) return node;
              if (node.parentElement) {
                node = node.parentElement;
                continue;
              }
              const root = node.getRootNode && node.getRootNode();
              node = root && root.host ? root.host : null;
            }
            return null;
          }

          function commonAncestor(nodes) {
            if (nodes.length === 0) return null;
            let candidate = nodes[0].parentElement;
            while (candidate) {
              if (nodes.every(function(node) { return candidate.contains(node); })) return candidate;
              candidate = candidate.parentElement;
            }
            return nodes[0].parentElement;
          }

          function styleTooltips() {
            scheduled = false;
            const cards = collect(document, ".patch-hover-card", []);
            const tooltips = new Set(cards.map(function(card) {
              return closestTooltip(card);
            }).filter(Boolean));

            for (const tooltip of tooltips) {
              const tooltipCards = collect(tooltip, ".patch-hover-card", []);
              const grid = commonAncestor(tooltipCards);
              if (!grid) continue;

              const columns = Math.min(
                HOVER_MAX_COLUMNS,
                Math.max(1, Math.ceil(Math.sqrt(tooltipCards.length)))
              );
              const width = columns * HOVER_CARD_WIDTH + (columns - 1) * HOVER_CARD_GAP;

              tooltip.classList.add("patch-hover-tooltip");
              tooltip.style.boxSizing = "border-box";
              tooltip.style.maxWidth = "calc(100vw - 48px)";
              tooltip.style.maxHeight = "calc(100vh - 48px)";
              tooltip.style.overflow = "auto";
              tooltip.style.padding = "8px";

              grid.classList.add("patch-hover-grid");
              grid.style.display = "grid";
              grid.style.gap = HOVER_CARD_GAP + "px";
              grid.style.alignItems = "start";
              grid.style.gridTemplateColumns = "repeat(" + columns + ", " + HOVER_CARD_WIDTH + "px)";
              grid.style.width = width + "px";

              for (const card of tooltipCards) card.style.margin = "0";
            }
          }

          function scheduleStyleTooltips() {
            if (scheduled) return;
            scheduled = true;
            requestAnimationFrame(styleTooltips);
          }

          const observer = new MutationObserver(scheduleStyleTooltips);
          observer.observe(document.documentElement, {childList: true, subtree: true});
          setInterval(styleTooltips, 250);
          styleTooltips();
        }

        function waitForBokeh(root) {
          return new Promise(function(resolve, reject) {
            if (root.Bokeh !== undefined) {
              resolve(root.Bokeh);
              return;
            }
            let attempts = 0;
            const timer = setInterval(function() {
              if (root.Bokeh !== undefined) {
                clearInterval(timer);
                resolve(root.Bokeh);
              } else if (++attempts > 100) {
                clearInterval(timer);
                reject(new Error("BokehJS library is missing."));
              }
            }, 10);
          });
        }

        function showError(error, dataSource) {
          console.error("Bokeh embed failed:", error);
          const target = document.getElementById(CONTAINER_ID);
          if (!target) return;
          target.style.display = "block";
          target.style.padding = "16px";
          target.style.font = "14px/1.4 system-ui, sans-serif";
          target.textContent = "Could not load column data from " + dataSource.url + ". Serve this HTML over HTTP, choose another predefined source, or pass another column JSON with ?data=path/to/data.json.";
        }

        async function embedDocument(root) {
          const dataSource = getDataSource();
          installDataSourceSelector(dataSource);
          try {
            const [bokeh, response] = await Promise.all([
              waitForBokeh(root),
              fetch(dataSource.url, {cache: "no-cache"})
            ]);
            if (!response.ok) throw new Error("HTTP " + response.status + " while loading " + dataSource.url);

            const rawData = await response.json();
            const columns = normalizeColumns(rawData);
            const annotations = normalizeAnnotations(rawData.annotations);
            const docs = JSON.parse(document.getElementById(TEMPLATE_JSON_ID).textContent);
            applyColumns(docs, columns, annotations);
            await bokeh.embed.embed_items(JSON.stringify(docs), buildRenderItems(docs));
            installSelectionPreview();
            installHoverTooltipLayout();
          } catch (error) {
            showError(error, dataSource);
          }
        }

        const fn = function() { embedDocument(window); };
        if (document.readyState !== "loading") fn();
        else document.addEventListener("DOMContentLoaded", fn);
      })();
    </script>
  </body>
</html>
